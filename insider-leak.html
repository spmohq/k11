<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tutorial Structure - Insider Leak Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .workflow-section {
      margin-bottom: 50px;
    }

    .input-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px 20px 0 0;
      padding: 25px;
      backdrop-filter: blur(12px);
      border-bottom: none;
    }

    .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0 0 20px 20px;
      padding: 25px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-label {
        font-size: 1rem;
        color: #fff;
        margin-bottom: 15px;
        font-weight: 700;
        display: block;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 20px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 15px;
      line-height: 1.5;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>“Insider Leak” posts</h1>
      <p class="subtitle">Insider Leak Content Workflow</p>
    </header>

    <main>
      <!-- SECTION 1 -->
      <div class="workflow-section">
        <div class="input-card">
          <label for="keywordInput">Keyword or Key Phrase</label>
          <textarea id="keywordInput" placeholder="e.g., WhatsApp Marketing Automation"></textarea>
        </div>
        <div class="output-card">
          <span class="prompt-label">MAIN PROMPT</span>
          <div class="prompt-content" id="p1Display"></div>
          <button class="copy-btn" onclick="copyText('p1Display', this)">
            <span>Copy Main Prompt</span>
          </button>
        </div>
      </div>

      <!-- SECTION 2 -->
      <div class="workflow-section">
        <div class="input-card">
          <label for="hookInput">Insert Hook</label>
          <textarea id="hookInput" placeholder="Paste your favorite generated hook here..."></textarea>
        </div>
        <div class="output-card">
          <span class="prompt-label">FOLLOW-UP PROMPT</span>
          <div class="prompt-content" id="p2Display"></div>
          <button class="copy-btn" onclick="copyText('p2Display', this)">
            <span>Copy Follow-up Prompt</span>
          </button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const keywordInput = document.getElementById('keywordInput');
    const hookInput = document.getElementById('hookInput');
    const p1Display = document.getElementById('p1Display');
    const p2Display = document.getElementById('p2Display');

    const updatePrompts = () => {
      const keyword = keywordInput.value.trim() || "[Keyword or Key Phrase]";
      const hook = hookInput.value.trim() || "[Insert Hook]";

      p1Display.innerText = `Generate 10 high-engagement hooks using the Insider Leak Technique for the topic:
${keyword}.

Each hook should:

• Frame the information as an industry secret or behind-the-scenes knowledge.
• Create the feeling that only a few insiders know this information.
• Spark curiosity, intrigue, and urgency.
• Make the reader feel they are about to discover something hidden from the public.
• Be suitable for social media platforms such as Facebook, LinkedIn, X, or Instagram.

Each hook should be short, punchy, and scroll-stopping.`;

      p2Display.innerText = `Using the hook provided below, write one high-engagement social media post using the Insider Leak Technique.

The post should:

• Expand the hook into a compelling narrative.
• Frame the information as an exclusive insider secret or leaked industry insight.
• Make the reader feel privileged to access hidden knowledge.
• Use language that builds curiosity, intrigue, and urgency.
• Maintain a natural conversational tone suitable for social media.
• Keep the content concise but engaging.

End the post with a strong call-to-action (CTA) that encourages readers to comment, react, or share before the “secret” disappears.

Hook:
${hook}`;
    };

    const copyText = (elementId, btn) => {
      const text = document.getElementById(elementId).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    };

    keywordInput.addEventListener('input', updatePrompts);
    hookInput.addEventListener('input', updatePrompts);

    // Initial state
    updatePrompts();
  </script>
</body>
</html>
