        function init() {

        function renderCards() {
            const keyword = document.getElementById('keywordInput').value.trim() || '[keyword]';
            const container = document.getElementById('cardsContainer');
            
            container.innerHTML = hustlesData.map((hustle, idx) => {
                const displayText = hustle.text.replace(/\[keyword\]/g, keyword);
                return `
                    <div class="hustle-card">
                        <div class="card-header">
                            <div class="card-number">Hustle #${hustle.number}</div>
                            <div class="card-title">${hustle.title}</div>
                            <div class="card-summary">${hustle.summary}</div>
                        </div>
                        <div class="card-body">
                            <div class="prompt-text" data-prompt="${idx}">
                                ${displayText}
                            </div>
                            <div class="card-actions">
                                <button class="action-btn expand-btn" onclick="toggleExpand(${idx})">
                                    Read More
                                </button>
                                <button class="action-btn copy-btn" onclick="copyPrompt(${idx})">
                                    📋 Copy
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleGenerate() {
            const keyword = document.getElementById('keywordInput').value.trim();
            
            if (!keyword) {
                alert('Please enter a keyword first!');
                return;
            }
            
            renderCards();
            showToast('Side Hustles Generated!');
            
            // Smooth scroll to results
            document.getElementById('cardsContainer').scrollIntoView({ 
                behavior: 'smooth',
                block: 'start'
            });
        }

        function toggleExpand(idx) {
            const promptEl = document.querySelector(`[data-prompt="${idx}"]`);
            const btn = event.target;
            
            promptEl.classList.toggle('expanded');
            btn.textContent = promptEl.classList.contains('expanded') ? 'Show Less' : 'Read More';
        }

        function copyPrompt(idx) {
            const keyword = document.getElementById('keywordInput').value.trim() || '[keyword]';
            const originalText = hustlesData[idx].text;
            const finalText = originalText.replace(/\[keyword\]/g, keyword);
            
            navigator.clipboard.writeText(finalText).then(() => {
                showToast('Prompt Copied!');
            }).catch(err => {
                console.error('Copy failed:', err);
                alert('Failed to copy. Please try again.');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
